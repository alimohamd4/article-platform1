{% extends 'base.html' %}
{% block title %}Login - ScholarLink{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-graduation-cap fa-3x" style="color: var(--primary);"></i>
                    <h4 class="fw-bold mt-2">Welcome Back</h4>
                    <p class="text-muted">Sign in to continue your learning journey</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="username" class="form-control" placeholder="name@university.edu" required>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label class="form-label">Password</label>
                            <a href="#" class="small" style="color: var(--primary);">Forgot Password?</a>
                        </div>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me for 30 days</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
                <p class="text-center mt-3 text-muted small">
                    Don't have an account? <a href="{% url 'accounts:register' %}" style="color: var(--primary);">Sign up for free</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

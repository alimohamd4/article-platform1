{% extends 'base.html' %}
{% block title %}Update Review{% endblock %}

{% block content %}
<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card p-4">
                <h4 class="fw-bold mb-4">Update Review</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Status</label>
                        <select name="status" class="form-select">
                            <option value="approved" {% if review.status == 'approved' %}selected{% endif %}>Approved</option>
                            <option value="rejected" {% if review.status == 'rejected' %}selected{% endif %}>Rejected</option>
                            <option value="revision" {% if review.status == 'revision' %}selected{% endif %}>Needs Revision</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Rating</label>
                        <div class="d-flex gap-2">
                            {% for i in "12345" %}
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="rating" value="{{ i }}" id="rating{{ i }}" {% if review.rating == forloop.counter %}checked{% endif %}>
                                <label class="form-check-label" for="rating{{ i }}">{{ i }} ⭐</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Feedback</label>
                        <textarea name="feedback" class="form-control" rows="6">{{ review.feedback }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update Review</button>
                        <a href="{% url 'articles:detail' slug=review.article.slug %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
